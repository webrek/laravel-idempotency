name: Bug report
description: Report a problem with the package
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect, and what did you get instead?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: The route definition and the request (method, headers, body) that triggers it.
      render: php
    validations:
      required: true
  - type: input
    id: package-version
    attributes:
      label: Package version
    validations:
      required: true
  - type: input
    id: laravel-version
    attributes:
      label: Laravel version
    validations:
      required: true
  - type: input
    id: php-version
    attributes:
      label: PHP version
    validations:
      required: true
  - type: input
    id: cache-store
    attributes:
      label: Cache store
      description: e.g. redis, memcached, database, file
    validations:
      required: true
